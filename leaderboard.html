<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - FireZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link class="flex flex-col items-center text-gray-500" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-white pb-28 font-sans selection:bg-orange-500 selection:text-white">

    <!-- Top Header -->
    <header class="p-5 bg-slate-900/90 backdrop-blur-md flex justify-between items-center shadow-xl border-b border-slate-800/80 sticky top-0 z-50">
        <h1 class="text-2xl font-black text-orange-500 italic tracking-wider">FIREZONE</h1>
        <h2 class="text-xs font-bold bg-orange-600/20 text-orange-400 border border-orange-500/30 px-3 py-1.5 rounded-full uppercase tracking-wider">
            Winners Hall
        </h2>
    </header>

    <div class="p-6 max-w-2xl mx-auto">
        <!-- Subtitle -->
        <div class="text-center mb-8">
            <h3 class="text-xl font-black uppercase tracking-tight text-slate-200">All Time Winners</h3>
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mt-1">सभी मैचों के विजेताओं की पूरी सूची</p>
        </div>

        <!-- Leaderboard List Container -->
        <div id="board" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 text-gray-500 space-y-3">
                <span class="text-4xl animate-spin text-orange-500"><i class="fa-solid fa-circle-notch"></i></span>
                <p class="font-medium text-sm">विजेताओं की लिस्ट लोड हो रही है...</p>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-850 p-3 flex justify-around items-center z-50">
        <a href="home.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all">
            <span class="text-xl mb-1"><i class="fa-solid fa-gamepad"></i></span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Play</span>
        </a>
        <a href="my-matches.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all">
            <span class="text-xl mb-1"><i class="fa-solid fa-ticket"></i></span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Matches</span>
        </a>
        <a href="help.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all">
            <span class="text-xl mb-1"><i class="fa-solid fa-clock-rotate-left"></i></span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Help</span>
        </a>
        <a href="leaderboard.html" class="flex flex-col items-center text-orange-500 transition-all">
            <span class="text-xl mb-1"><i class="fa-solid fa-ranking-star"></i></span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Rank</span>
        </a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC8NQ_bmJl-qRy0H_AzJ968bWwzhwMAsGw",
            authDomain: "firezone-a0a02.firebaseapp.com",
            projectId: "firezone-a0a02",
            storageBucket: "firezone-a0a02.firebasestorage.app",
            messagingSenderId: "1068854164782",
            appId: "1:1068854164782:web:8a627cdf687583debecebf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Auth Guard
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "index.html";
            }
        });

        // पूरे डेटाबेस से सिर्फ रैंक 1 (Winners) वाले सभी रिकॉर्ड्स को लाइव लाना
        db.collection("registrations")
          .where("rank", "==", 1)
          .onSnapshot(async (snap) => {
            const board = document.getElementById('board');
            board.innerHTML = "";
            
            if (snap.empty) {
                board.innerHTML = `
                    <div class="text-center py-16 bg-slate-900 rounded-3xl border border-slate-800/80 p-6">
                        <p class="text-gray-400 text-sm">अभी तक कोई भी मैच विनर घोषित नहीं हुआ है।</p>
                    </div>
                `;
                return;
            }

            let winnersList = [];

            // सभी विनर का डेटा एरे में डालें और साथ ही मैच की डिटेल्स (तारीख और नाम) भी निकालें
            for (const doc of snap.docs) {
                const regData = doc.data();
                let matchTitle = "Tournament Match";
                let matchDate = "Recent";

                try {
                    // मैच आईडी से मैच का नाम और तारीख ढूंढना
                    if (regData.matchId) {
                        const mDoc = await db.collection("matches").doc(regData.matchId).get();
                        if (mDoc.exists) {
                            const mData = mDoc.data();
                            matchTitle = mData.title || "Match";
                            // अगर मैच में डेट फ़ील्ड है तो उसे दिखाएं
                            matchDate = mData.date || mData.matchDate || new Date().toLocaleDateString('hi-IN');
                        }
                    }
                } catch (e) {
                    console.log("Match info error", e);
                }

                winnersList.push({
                    ...regData,
                    matchTitle: matchTitle,
                    matchDate: matchDate
                });
            }

            // सबसे ज़्यादा प्राइज मनी (Total Won) के हिसाब से विजेताओं को क्रमबद्ध (Sort) करना
            winnersList.sort((a, b) => {
                const prizeA = Number(a.prizeEarned || a.earning || 0);
                const prizeB = Number(b.prizeEarned || b.earning || 0);
                return prizeB - prizeA; 
            });

            let rankIndex = 1;
            winnersList.forEach(regData => {
                
                let medal = `#${rankIndex}`;
                let cardStyle = "bg-slate-900/60 border-slate-900";
                let badgeColor = "text-gray-400";

                if (rankIndex === 1) {
                    medal = "🥇";
                    cardStyle = "bg-amber-500/10 border-amber-500/30 shadow-lg shadow-amber-500/5";
                    badgeColor = "text-amber-500 font-black";
                } else if (rankIndex === 2) {
                    medal = "🥈";
                    cardStyle = "bg-slate-300/10 border-slate-300/20";
                    badgeColor = "text-slate-300 font-black";
                } else if (rankIndex === 3) {
                    medal = "🥉";
                    cardStyle = "bg-amber-700/10 border-amber-700/20";
                    badgeColor = "text-amber-700 font-black";
                }

                const totalPrize = regData.prizeEarned || regData.earning || 0;
                const killCount = regData.kills || 0;

                board.innerHTML += `
                    <div class="flex justify-between items-center p-4 rounded-2xl border ${cardStyle} transition-all">
                        <div class="flex items-center gap-4 truncate">
                            <!-- Rank/Medal -->
                            <span class="text-lg w-8 text-center ${badgeColor}">${medal}</span>
                            
                            <!-- User Avatar Placeholder -->
                            <div class="relative shrink-0">
                                <img src="https://via.placeholder.com/150" class="w-11 h-11 rounded-full border-2 border-slate-800 object-cover shadow">
                                ${rankIndex === 1 ? '<span class="absolute -top-2 -right-1 text-xs">👑</span>' : ''}
                            </div>

                            <!-- User & Match Details -->
                            <div class="truncate">
                                <p class="font-black text-sm uppercase tracking-tight text-gray-100 truncate">${regData.username || 'Player'}</p>
                                <p class="text-[9px] text-orange-400/90 font-bold uppercase tracking-wider truncate mt-0.5">🎮 ${regData.matchTitle}</p>
                                <p class="text-[8px] text-gray-500 font-mono tracking-wide mt-0.5">📅 ${regData.matchDate}</p>
                            </div>
                        </div>

                        <!-- Kills & Total Prize Won -->
                        <div class="flex items-center gap-4 shrink-0">
                            <div class="text-center">
                                <p class="text-[9px] text-gray-500 font-black uppercase tracking-wider">Kills</p>
                                <p class="text-sm font-black text-orange-500">${killCount}</p>
                            </div>
                            <div class="text-right border-l border-slate-800/80 pl-3">
                                <p class="text-[9px] text-gray-500 font-black uppercase tracking-wider">Total Won</p>
                                <p class="text-sm font-black text-green-500">₹${totalPrize}</p>
                            </div>
                        </div>
                    </div>
                `;
                rankIndex++;
            });
        }, error => {
            console.error("Error loading Leaderboard: ", error);
            document.getElementById('board').innerHTML = `
                <p class="text-center py-10 text-red-500">डेटा लोड करने में समस्या आई।</p>
            `;
        });
    </script>
</body>
</html>
