<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireZone Secure Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #0b0c10; color: #ffffff; overflow: hidden; }

        /* Login Screen Styles */
        .login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0c10; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box { text-align: center; width: 80%; max-width: 300px; }
        .login-box h2 { color: #ff4a00; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px;
            border: 1px solid #1f2833; background: #1f2833; color: white; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; background-color: #ff4a00; border: none;
            color: white; font-weight: bold; border-radius: 5px; cursor: pointer;
        }

        /* Iframe & Loader (Same as before) */
        #webFrame { width: 100%; height: 100%; border: none; display: none; }
        .loader-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b0c10; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        .spinner { width: 60px; height: 60px; border: 6px solid #1f2833; border-top: 6px solid #ff4a00; border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-text { margin-top: 20px; font-weight: bold; color: #ffffff; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 1. Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>FireZone Admin</h2>
            <input type="password" id="passwordInput" placeholder="पासवर्ड डालें">
            <button onclick="checkPassword()">लॉगिन करें</button>
        </div>
    </div>

    <!-- 2. Main App Content -->
    <iframe id="webFrame" src="https://bitukumari841220-dotcom.github.io/A/"></iframe>

    <!-- 3. Loader -->
    <div id="loaderScreen" class="loader-screen">
        <div class="spinner"></div>
        <div class="loader-text">FireZone लोड हो रहा है पंप...</div>
    </div>

    <script>
        // अपना पासवर्ड यहाँ सेट करें
        const correctPassword = "sitij@9934"; 

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === correctPassword) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('loaderScreen').style.display = 'flex';
                document.getElementById('webFrame').style.display = 'block';
            } else {
                alert("गलत पासवर्ड! कृपया दोबारा कोशिश करें।");
            }
        }

        const iframe = document.getElementById('webFrame');
        iframe.onload = function() {
            document.getElementById('loaderScreen').style.display = 'none';
        };
    </script>
</body>
</html>
